<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | MB Crunchy</title>

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header>

    <div>
        <strong>MB Crunchy</strong>
    </div>

    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">
            Cart (<span id="cartCount">0</span>)
        </a>
    </nav>

</header>


<div class="container">

    <div id="loading" class="text-center">
        <h2>Loading Product...</h2>
    </div>

    <div id="product" class="card" style="display:none;padding:25px;">

        <div style="
            display:grid;
            grid-template-columns:350px 1fr;
            gap:30px;
            align-items:start;
        ">

            <div>

                <img
                    id="image"
                    src="assets/images/placeholder.webp"
                    alt="Product"
                    style="
                        width:100%;
                        border-radius:10px;
                        object-fit:cover;
                    ">

            </div>

            <div>

                <h1 id="name"></h1>

                <p id="description"></p>

                <div class="price" style="margin-top:20px;">

                    <del id="mrp"></del>

                    <strong id="price"
                            style="font-size:30px;color:#b5121b;">
                    </strong>

                    <div
                        id="discount"
                        class="discount"
                        style="margin-top:6px;">
                    </div>

                </div>

                <hr style="margin:20px 0;">

                <p>
                    <strong>Stock :</strong>
                    <span id="stock"></span>
                </p>

                <p>
                    <strong>Weight :</strong>
                    <span id="weight"></span>
                </p>

                <br>

                <label>
                    <strong>Quantity</strong>
                </label>

                <input
                    type="number"
                    id="qty"
                    min="1"
                    value="1"
                    style="width:120px;">

                <br><br>

                <button id="addBtn">
                    Add To Cart
                </button>

            </div>

        </div>

    </div>

</div>


<footer>

    © MB Crunchy

</footer>



<script>

window.API_BASE =
"https://script.google.com/macros/s/AKfycbzUs227I1_uMAXkInKx0ekwBNOlb6h5mmWXoyrGfyAN1wrTacJuDGndS2utiMSlooQm/exec";

</script>


<script src="assets/js/app.js"></script>


<script>

const id = new URLSearchParams(window.location.search).get("id");

async function loadProduct() {

    if (!id) {

        document.getElementById("loading").innerHTML =
            "<h2>Invalid Product ID.</h2>";

        return;
    }

    try {

        App.showLoader();

        console.log("Loading Product:", id);

        const product = await App.get("product", {
            id: id
        });

        console.log(product);

        document.getElementById("loading").style.display = "none";
        document.getElementById("product").style.display = "block";

        const image = document.getElementById("image");

        image.src =
            "assets/images/" +
            (product.image || "placeholder.webp");

        image.onerror = function () {

            console.log("Image Missing");

            this.src =
                "assets/images/placeholder.webp";

        };

        document.getElementById("name").textContent =
            product.name;

        document.getElementById("description").textContent =
            product.description || "";

        document.getElementById("mrp").textContent =
            "₹" + product.mrp;

        document.getElementById("price").textContent =
            " ₹" + product.price;

        document.getElementById("discount").textContent =
            product.discountPercent + "% OFF";

        document.getElementById("stock").textContent =
            product.stock;

        document.getElementById("weight").textContent =
            product.weight || "-";

        document.getElementById("addBtn").onclick = function () {

            const qty =
                parseInt(
                    document.getElementById("qty").value
                ) || 1;

            App.addToCart(product.id, qty);

        };

    }

    catch (err) {

        console.error(err);

        document.getElementById("loading").innerHTML =
            "<h2>Product Not Found</h2>";

    }

    finally {

        App.hideLoader();

    }

}

loadProduct();

</script>

</body>
</html>
