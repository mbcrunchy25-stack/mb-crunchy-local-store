<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Products | MB Crunchy</title>

<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header>
<div><strong>MB Crunchy</strong></div>

<nav>
<a href="index.html">Home</a>
<a href="products.html">Products</a>
<a href="cart.html">Cart (<span id="cartCount">0</span>)</a>
</nav>

</header>

<div class="container">

<h1>Products</h1>

<div id="products" class="grid"></div>

<div id="loading" class="text-center">
Loading Products...
</div>

</div>

<footer>
© MB Crunchy
</footer>

<script>
window.API_BASE="https://script.google.com/macros/s/AKfycbzUs227I1_uMAXkInKx0ekwBNOlb6h5mmWXoyrGfyAN1wrTacJuDGndS2utiMSlooQm/exec
";
</script>

<script src="assets/js/app.js"></script>

<script>

async function loadProducts(){

try{

App.showLoader();

const products=await App.get("products");

document.getElementById("loading").style.display="none";

const grid=document.getElementById("products");

grid.innerHTML="";

products.forEach(product=>{

grid.innerHTML+=`

<div class="card">

<img src="assets/images/${product.image || 'placeholder.webp'}">

<h3>${product.name}</h3>

<p>${product.description || ""}</p>

<p>

<del>₹${product.mrp}</del>

<strong> ₹${product.price}</strong>

</p>

<button onclick="location.href='product.html?id=${product.id}'">

View Product

</button>

</div>

`;

});

}catch(err){

document.getElementById("loading").innerHTML=

"<h2>Unable to load products.</h2>";

console.log(err);

}finally{

App.hideLoader();

}

}

loadProducts();

</script>

</body>
</html>
