<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products | MB Crunchy</title>

<link rel="stylesheet" href="assets/css/style.css">

<style>

.page-title{
    margin-bottom:25px;
}

.toolbar{
    margin-bottom:30px;
}

#search{
    max-width:350px;
}

.card{
    display:flex;
    flex-direction:column;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    background:#f3f3f3;
}

.card-body{
    display:flex;
    flex-direction:column;
    flex:1;
}

.card-body p{
    flex:1;
}

.price{
    margin:12px 0;
}

.price strong{
    color:#b5121b;
    font-size:22px;
}

.price del{
    margin-right:8px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:15px;
}

.actions button,
.actions a{

    flex:1;
    text-align:center;
}

</style>

</head>

<body>

<header>

<div><strong>MB Crunchy</strong></div>

<nav>

<a href="index.html">Home</a>

<a href="products.html">Products</a>

<a href="cart.html">

Cart (<span id="cartCount">0</span>)

</a>

</nav>

</header>

<div class="container">

<h1 class="page-title">
Our Products
</h1>

<div class="toolbar">

<input
id="search"
type="text"
placeholder="Search products...">

</div>

<div
id="loading"
class="text-center">

Loading Products...

</div>

<div
id="products"
class="grid">

</div>

</div>

<footer>

© MB Crunchy

</footer>

<script>

window.API_BASE =
"https://script.google.com/macros/s/AKfycbzUs227I1_uMAXkInKx0ekwBNOlb6h5mmWXoyrGfyAN1wrTacJuDGndS2utiMSlooQm/exec";

</script>

<script src="assets/js/app.js"></script>

<script>

let allProducts=[];

async function loadProducts(){

    try{

        App.showLoader();

        const products=await App.get("products");

        console.log(products);

        allProducts=products;

        renderProducts(products);

    }

    catch(err){

        console.error(err);

        document.getElementById("loading").innerHTML=
        "<h2>Unable to load products.</h2>";

    }

    finally{

        App.hideLoader();

    }

}

function renderProducts(products){

    const container=document.getElementById("products");

    document.getElementById("loading").style.display="none";

    container.innerHTML="";

    if(products.length===0){

        container.innerHTML="<h2>No products found.</h2>";

        return;

    }

    products.forEach(product=>{

        const card=document.createElement("div");

        card.className="card";

        card.innerHTML=`

        <img
            src="assets/images/${product.image || 'placeholder.webp'}"
            alt="${product.name}"
            onerror="this.src='assets/images/placeholder.webp'">

        <div class="card-body">

            <h3>${product.name}</h3>

            <p>${product.description || ""}</p>

            <div class="price">

                <del>₹${product.mrp}</del>

                <strong>₹${product.price}</strong>

                <div class="discount">

                    ${product.discountPercent}% OFF

                </div>

            </div>

            <div class="actions">

                <a
                    href="product.html?id=${product.id}"
                    class="btn">

                    View

                </a>

                <button
                    data-id="${product.id}">

                    Add

                </button>

            </div>

        </div>

        `;

        container.appendChild(card);

    });

    document
    .querySelectorAll("button[data-id]")
    .forEach(btn=>{

        btn.onclick=function(){

            App.addToCart(
                this.dataset.id,
                1
            );

        };

    });

}

document
.getElementById("search")
.addEventListener("input",function(){

    const q=this.value
    .toLowerCase()
    .trim();

    const filtered=allProducts.filter(p=>{

        return (

            p.name.toLowerCase().includes(q)

            ||

            p.description.toLowerCase().includes(q)

        );

    });

    renderProducts(filtered);

});

loadProducts();

</script>

</body>
</html>
