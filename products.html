<script>

let allProducts = [];

async function loadProducts() {

    const loading = document.getElementById("loading");
    const container = document.getElementById("products");

    loading.innerHTML = "Loading Products...";

    try {

        App.showLoader();

        // Fetch products
        const products = await App.get("products");

        console.log("Products:", products);

        if (!Array.isArray(products)) {
            throw new Error("API did not return an array.");
        }

        allProducts = products;

        renderProducts(allProducts);

    }
    catch (err) {

        console.error(err);

        loading.innerHTML = `
            <h2>Unable to load products.</h2>
            <p>${err.message}</p>
        `;

    }
    finally {

        App.hideLoader();

    }

}

function renderProducts(products) {

    const loading = document.getElementById("loading");
    const container = document.getElementById("products");

    loading.style.display = "none";

    container.innerHTML = "";

    if (!products.length) {

        container.innerHTML = "<h2>No products found.</h2>";
        return;

    }

    products.forEach(product => {

        const image = product.image
            ? "assets/images/" + product.image
            : "assets/images/placeholder.webp";

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <img
                src="${image}"
                alt="${product.name}"
                onerror="this.src='assets/images/placeholder.webp'">

            <div class="card-body">

                <h3>${product.name}</h3>

                <p>${product.description || ""}</p>

                <div class="price">

                    <del>₹${product.mrp}</del>

                    <strong>₹${product.price}</strong>

                    <div class="discount">

                        ${product.discountPercent || 0}% OFF

                    </div>

                </div>

                <div class="actions">

                    <a
                        href="product.html?id=${product.id}"
                        class="btn">

                        View

                    </a>

                    <button
                        class="addCart"
                        data-id="${product.id}">

                        Add

                    </button>

                </div>

            </div>

        `;

        container.appendChild(card);

    });

    document.querySelectorAll(".addCart").forEach(btn => {

        btn.onclick = function () {

            App.addToCart(this.dataset.id, 1);

        };

    });

}

document.getElementById("search").addEventListener("input", function () {

    const q = this.value.trim().toLowerCase();

    const filtered = allProducts.filter(p =>

        (p.name || "").toLowerCase().includes(q) ||
        (p.description || "").toLowerCase().includes(q)

    );

    renderProducts(filtered);

});

document.addEventListener("DOMContentLoaded", loadProducts);

</script>
