<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Checkout | MB Crunchy</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f8f8f8}
header{background:#b5121b;color:#fff;padding:15px 20px}
.container{max-width:1100px;margin:auto;padding:20px;display:grid;grid-template-columns:2fr 1fr;gap:20px}
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
label{display:block;margin-top:12px;font-weight:bold}
input,textarea{width:100%;padding:10px;margin-top:5px;box-sizing:border-box}
button{margin-top:20px;background:#b5121b;color:#fff;border:none;padding:14px 18px;border-radius:8px;cursor:pointer;width:100%}
img.qr{width:220px;display:block;margin:15px auto}
@media(max-width:800px){.container{grid-template-columns:1fr}}
</style>
</head>
<body>

<header><h2>MB Crunchy Checkout</h2></header>

<div class="container">

<div class="card">
<h3>Delivery Details</h3>

<label>Name</label>
<input id="name">

<label>Mobile</label>
<input id="phone">

<label>Email (Optional)</label>
<input id="email">

<label>Address</label>
<textarea id="address"></textarea>

<label>City</label>
<input id="city">

<label>Pincode</label>
<input id="pincode">

<label>Distance (KM)</label>
<input id="distance" type="number" value="3">

<label>UPI Transaction ID</label>
<input id="upi">

<button onclick="placeOrder()">Place Order</button>

</div>

<div class="card">

<h3>Order Summary</h3>

<div id="summary"></div>

<hr>

<p>Scan & Pay</p>

<img class="qr" src="assets/images/upi-qr.png" alt="UPI QR">

<p><strong>UPI ID</strong></p>
<p id="upiid">Yachamswapna@ybl</p>

<p>Total : ₹<span id="grand">0</span></p>

</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzUs227I1_uMAXkInKx0ekwBNOlb6h5mmWXoyrGfyAN1wrTacJuDGndS2utiMSlooQm/exec";

let products=[];
let cart=[];

async function init(){

 const p=await fetch(API+"products");
 products=(await p.json()).data;

 cart=JSON.parse(localStorage.getItem("cart")||"[]");

 renderSummary();

}

function renderSummary(){

 let html="";
 let total=0;

 cart.forEach(item=>{

   const p=products.find(x=>x.id===item.productId);
   if(!p) return;

   const line=p.price*item.qty;
   total+=line;

   html+=`
   <p>${p.name} × ${item.qty}<br>
   ₹${line}</p>`;

 });

 document.getElementById("summary").innerHTML=html;
 document.getElementById("grand").textContent=total;

}

async function placeOrder(){

 const body={
   action:"order.create",
   customer:{
     name:name.value,
     phone:phone.value,
     email:email.value,
     address:address.value,
     city:city.value,
     pincode:pincode.value
   },
   distanceKm:Number(distance.value),
   paymentStatus:"Pending",
   items:cart,
   upiReference:upi.value
 };

 const res=await fetch(API,{
   method:"POST",
   headers:{"Content-Type":"application/json"},
   body:JSON.stringify(body)
 });

 const json=await res.json();

 if(!json.success){
   alert(json.message);
   return;
 }

 localStorage.removeItem("cart");

 const msg=encodeURIComponent(json.data.whatsappMessage);
 const wa="https://wa.me/917842032879?text="+msg;

 window.location.href=wa;

}
init();
</script>

</body>
</html>
