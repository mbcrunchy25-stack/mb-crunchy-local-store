<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cart | MB Crunchy</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#faf7f2}
header{background:#b5121b;color:#fff;padding:15px 20px;display:flex;justify-content:space-between}
header a{color:#fff;text-decoration:none;margin-left:15px}
.container{max-width:1100px;margin:auto;padding:20px}
.item{display:grid;grid-template-columns:90px 1fr auto;gap:15px;background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;align-items:center}
.item img{width:90px;height:90px;object-fit:cover;background:#eee;border-radius:8px}
.qty button{width:30px;height:30px}
.summary{background:#fff;padding:20px;border-radius:10px}
.btn{background:#b5121b;color:#fff;border:none;padding:12px 20px;border-radius:8px;cursor:pointer}
</style>
</head>
<body>

<header>
<div><strong>MB Crunchy</strong></div>
<nav>
<a href="products.html">Products</a>
<a href="checkout.html">Checkout</a>
</nav>
</header>

<div class="container">
<h1>Your Cart</h1>

<div id="cartItems"></div>

<div class="summary">
<p>Subtotal : ₹<span id="subtotal">0</span></p>
<p>Shipping : ₹<span id="shipping">0</span></p>
<h2>Total : ₹<span id="total">0</span></h2>
<button class="btn" onclick="checkout()">Proceed to Checkout</button>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbzUs227I1_uMAXkInKx0ekwBNOlb6h5mmWXoyrGfyAN1wrTacJuDGndS2utiMSlooQm/exec";
let products=[];

async function init(){
 const res=await fetch(API+"products");
 const json=await res.json();
 products=json.data;
 render();
}

function getCart(){
 return JSON.parse(localStorage.getItem("cart")||"[]");
}

function saveCart(cart){
 localStorage.setItem("cart",JSON.stringify(cart));
}

async function render(){

 const cart=getCart();
 const box=document.getElementById("cartItems");
 box.innerHTML="";

 let subtotal=0;

 cart.forEach(c=>{

   const p=products.find(x=>x.id===c.productId);
   if(!p) return;

   const line=p.price*c.qty;
   subtotal+=line;

   box.innerHTML+=`
   <div class="item">
     <img src="assets/images/${p.image||'placeholder.webp'}">
     <div>
       <h3>${p.name}</h3>
       <p>₹${p.price} × ${c.qty}</p>
       <strong>₹${line}</strong>
     </div>
     <div class="qty">
       <button onclick="changeQty('${c.productId}',-1)">-</button>
       <button onclick="changeQty('${c.productId}',1)">+</button>
       <br><br>
       <button onclick="removeItem('${c.productId}')">Remove</button>
     </div>
   </div>`;
 });

 let shipping=0;

 try{
   const s=await fetch(API+"shipping&distance=3");
   const j=await s.json();
   shipping=j.data.charge||0;
 }catch(e){}

 document.getElementById("subtotal").textContent=subtotal;
 document.getElementById("shipping").textContent=shipping;
 document.getElementById("total").textContent=subtotal+shipping;

}

function changeQty(id,d){
 let cart=getCart();
 const item=cart.find(x=>x.productId===id);
 if(!item) return;
 item.qty+=d;
 if(item.qty<=0)
   cart=cart.filter(x=>x.productId!==id);
 saveCart(cart);
 render();
}

function removeItem(id){
 let cart=getCart().filter(x=>x.productId!==id);
 saveCart(cart);
 render();
}

function checkout(){
 location.href="checkout.html";
}

init();
</script>

</body>
</html>
